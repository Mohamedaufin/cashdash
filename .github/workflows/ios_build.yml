name: iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./cashdash_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Force pod generation
        run: flutter build ios --config-only || true

      - name: Force iOS 14.0 Deployment Target in Podfile
        run: |
          ruby -i -pe 'gsub(/flutter_additional_ios_build_settings\(target\)/, "flutter_additional_ios_build_settings(target)\n      target.build_configurations.each do |config|\n        config.build_settings[%q(IPHONEOS_DEPLOYMENT_TARGET)] = %q(14.0)\n      end")' ios/Podfile

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Compress iOS build
        run: tar -czf ios-build.tar.gz build/ios/iphoneos

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-unsigned
          path: cashdash_flutter/ios-build.tar.gz
