name: iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./cashdash_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Force pod generation
        run: flutter build ios --config-only || true

      - name: Force iOS 14.0 Deployment Target in Podfile
        run: |
          echo "post_install do |installer|" >> ios/Podfile
          echo "  installer.pods_project.targets.each do |target|" >> ios/Podfile
          echo "    target.build_configurations.each do |config|" >> ios/Podfile
          echo "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'" >> ios/Podfile
          echo "    end" >> ios/Podfile
          echo "  end" >> ios/Podfile
          echo "end" >> ios/Podfile

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Compress iOS build
        run: tar -czf ios-build.tar.gz build/ios/iphoneos

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-unsigned
          path: cashdash_flutter/ios-build.tar.gz
